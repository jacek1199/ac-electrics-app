<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A.C. Electrics logo">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="120" cy="108" r="58" fill="none" stroke="#2f93a8" stroke-width="7"/>

  <!-- bulb branch, top-left -->
  <path d="M62 108 C 40 108, 34 98, 34 84 C 34 70, 44 62, 56 62" fill="none" stroke="#2f93a8" stroke-width="6" stroke-linecap="round"/>
  <circle cx="56" cy="46" r="16" fill="none" stroke="#2f93a8" stroke-width="6"/>
  <path d="M50 58 L62 58 M52 62 L60 62" stroke="#2f93a8" stroke-width="4" stroke-linecap="round"/>
  <path d="M50 42 L62 50 M62 42 L50 50" stroke="#f2b705" stroke-width="4" stroke-linecap="round"/>

  <!-- plug branch, top-right -->
  <path d="M178 108 C 200 108, 206 98, 206 84 C 206 70, 196 62, 184 62" fill="none" stroke="#2f93a8" stroke-width="6" stroke-linecap="round"/>
  <rect x="172" y="46" width="24" height="18" rx="3" fill="none" stroke="#2f93a8" stroke-width="6"/>
  <path d="M180 46 L180 38 M192 46 L192 38" stroke="#2f93a8" stroke-width="5" stroke-linecap="round"/>

  <!-- cable branch, bottom-left -->
  <path d="M62 138 C 40 138, 30 148, 30 162" fill="none" stroke="#2f93a8" stroke-width="6" stroke-linecap="round"/>
  <path d="M30 162 c -10 4 -10 16 0 20 c 8 3 16 -3 14 -12" fill="none" stroke="#2f93a8" stroke-width="6" stroke-linecap="round"/>

  <!-- resistor branch, bottom-right -->
  <path d="M178 138 L192 138 L196 128 L202 148 L208 128 L212 148 L216 138 L228 138" fill="none" stroke="#2f93a8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M228 138 L228 162 L206 162 L206 172" fill="none" stroke="#2f93a8" stroke-width="6" stroke-linecap="round"/>

  <!-- bolt -->
  <path d="M132 54 L92 128 L116 128 L104 176 L152 108 L124 108 Z" fill="#f2b705" filter="url(#glow)"/>

  <text x="120" y="206" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="30" fill="#2f93a8" stroke="#f2b705" stroke-width="0.6">A.C.</text>
  <text x="120" y="236" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-weight="800" font-size="34" fill="#2f93a8" stroke="#f2b705" stroke-width="0.6" letter-spacing="1">ELECTRICS</text>
</svg>
